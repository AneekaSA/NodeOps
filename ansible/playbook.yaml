- hosts: webservers
  vars:
    app_dir: /home/ec2-user/app-src

  tasks:

    - name: Update yum cache
      yum:
        update_cache: yes

    - name: Install required packages
      package:
        name:
          - git
          - docker
        state: present

    - name: Enable and start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

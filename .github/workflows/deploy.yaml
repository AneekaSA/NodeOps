name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy to server over SSH and build/run
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          set -e
          cd /home/ec2-user
          if [ -d app-src ]; then
            cd app-src
            git fetch --all
            git reset --hard origin/main
          else
            git clone https://github.com/${{ github.repository }}.git app-src
            cd app-src
          fi

          # write .env from GitHub Secrets (server-side file, NOT committed)
          cat > /home/ec2-user/app-src/.env <<'EOF'
USERNAME=admin
PASSWORD=admin123
SECRET_MESSAGE=secretmessage
PORT=3000
EOF

          cd /home/ec2-user/app-src

          # build and run (use sudo to be safe)
          sudo docker build -t node-basic-auth:latest .
          sudo docker rm -f node-basic-auth || true
          sudo docker run -d --name node-basic-auth --restart unless-stopped -p 80:3000 --env-file /home/ec2-user/app-src/.env node-basic-auth:latest
